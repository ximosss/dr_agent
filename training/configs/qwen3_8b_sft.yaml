### Model
model_name_or_path: /data/qwen3-8b
trust_remote_code: true

### Method
stage: sft
do_train: true
do_eval: true
finetuning_type: lora
lora_target: all
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

### Dataset
dataset_dir: /home/ubuntu/workspace/dr_agent/training/data
dataset: dr_agent_sft_train
eval_dataset: dr_agent_sft_eval
template: qwen3
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8

### Output
# run_training.sh overrides this with a versioned output_dir at launch time.
output_dir: /data/sft_output/qwen3-8b-dr-agent
logging_steps: 10
save_steps: 200
save_total_limit: 3
overwrite_output_dir: true

### Train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
gradient_checkpointing: true

### Eval
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200

### Logging
# report_to: none
report_to: wandb
run_name: qwen3-8b-dr-agent-sft
